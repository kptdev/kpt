# Copilot code review configuration for kpt
# kpt is a Kubernetes configuration package management and orchestration system

review:
  instructions:
    # Linter overlap — these are already enforced by golangci-lint in CI
    - "Do not comment on issues caught by: errcheck, govet, ineffassign, staticcheck, unused, nosprintfhostport, gofmt"
    - "Do not comment on import ordering or formatting"

    # Style — established project conventions
    - "Do not comment on error wrapping style (this project uses fmt.Errorf with %w consistently)"
    - "Do not suggest renaming variables, functions, or packages unless semantically misleading"
    - "Do not suggest extracting single-use helper functions"
    - "Do not suggest adding comments to exported symbols unless the function is non-obvious"

    # Architecture context
    - "This is a Kubernetes configuration management tool using kyaml/kustomize ecosystem"
    - "Controllers and APIs follow kpt's Kptfile specification and package management patterns"
    - "Do not flag intentional use of nil results in pkg operations (graceful fallback patterns)"
    - "log.FromContext(ctx) is the logging convention — do not suggest alternatives"
    - "Testing uses testutil setup patterns with git repositories and workspaces — do not refactor test helpers"

    # What to actually review
    - "Focus on: logic errors, race conditions, resource leaks, deadlocks, nil pointer dereferences"
    - "Flag: missing context cancellation checks, unbounded goroutines, missing error handling in deferred Close calls"
    - "Flag: incorrect kyaml/kustomize API usage, broken file system operations"
    - "Flag: security issues (credential leaks, injection vulnerabilities, path traversal)"
    - "Flag: incorrect Git/package handling (bad ref handling, missing upstream validation)"
    - "Flag: potential issues with YAML/Kptfile parsing or manipulation"

  path_instructions:
    - path: "api/generated/**"
      instructions: "Do not review — generated by k8s code-generator"
    - path: "**/zz_generated*"
      instructions: "Do not review — generated by controller-tools"
    - path: "third_party/**"
      instructions: "Do not review — vendored upstream code"
    - path: "go.sum"
      instructions: "Do not review"
    - path: "go.mod"
      instructions: "Only flag if a dependency looks suspicious or has a known CVE"
    - path: "docs/**"
      instructions: "Only flag factual errors or broken links. Do not comment on grammar or style"
    - path: "site/**"
      instructions: "Only flag factual errors. Do not suggest style/formatting changes to documentation"
    - path: "**/*_test.go"
      instructions: "Focus on correctness and flakiness risks. testify (assert/require) and table-driven tests are the standard. Do not suggest style changes or test refactoring"
    - path: "test/**"
      instructions: "Only flag correctness/security issues. testutil patterns are intentional — do not suggest refactoring. Note: golangci-lint excludes test/ from CI linting"
    - path: ".github/**"
      instructions: "Focus on security (pinned actions, minimal permissions, injection risks). Do not suggest cosmetic changes"
    - path: "examples/**"
      instructions: "Only flag correctness issues. These are tutorial configs — do not enforce strict linting"
