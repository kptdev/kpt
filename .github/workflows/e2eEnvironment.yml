name: "Kpt Live - E2E Tests"
on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "documentation/**"
      - "site/**"
  push:
    branches:
    - '!dependabot/*'
    paths-ignore:
      - "docs/**"
      - "documentation/**"
      - "site/**"

jobs:
  kind:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ["1.35", "1.36"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          path: go/src/github.com/kptdev/kpt
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go/src/github.com/kptdev/kpt/go.mod
          cache: true
          cache-dependency-path: go/src/github.com/kptdev/kpt/go.sum
      - name: Install Kind
        uses: helm/kind-action@v1
        with:
          version: v0.32.0
          install_only: true
      - name: Run Tests
        working-directory: go/src/github.com/kptdev/kpt
        env:
          K8S_VERSION: ${{ matrix.version }}
        run: |
          ./e2e/live/end-to-end-test.sh -k $K8S_VERSION
