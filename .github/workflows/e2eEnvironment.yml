# Live E2E Tests using bash script.
#
# Do not use workflow-level paths-ignore for required checks.
# GitHub leaves skipped required workflows Pending forever.
# Instead, we always run the workflow and skip individual jobs conditionally.

name: Live E2E
on:
  pull_request:
  push:
    branches:
    - '!dependabot/*'

jobs:
  # Detect which path groups changed to conditionally skip expensive jobs.
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      live: ${{ steps.filter.outputs.live }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            live:
              - 'commands/live/**'
              - 'e2e/live/**'
              - 'pkg/live/**'

  live-e2e:
    name: live-e2e-k8s${{ matrix.k8s }}
    needs: changes
    if: needs.changes.outputs.live == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - k8s: "1.35"
          - k8s: "1.36"
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          path: go/src/github.com/kptdev/kpt
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go/src/github.com/kptdev/kpt/go.mod
          cache: true
          cache-dependency-path: go/src/github.com/kptdev/kpt/go.sum
      - name: Install Kind
        uses: helm/kind-action@v1
        with:
          version: v0.32.0
          install_only: true
      - name: Run Tests
        working-directory: go/src/github.com/kptdev/kpt
        env:
          K8S_VERSION: ${{ matrix.k8s }}
        run: |
          ./e2e/live/end-to-end-test.sh -k $K8S_VERSION

  live-e2e-gate:
    name: live-e2e
    needs: [changes, live-e2e]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          # If no live changes, this check is not applicable, pass.
          if [ "${{ needs.changes.outputs.live }}" = "false" ]; then
            echo "No live changes, skipping Live E2E tests"
            exit 0
          fi
          
          # If any required job failed, fail this check.
          if [ "${{ needs.live-e2e.result }}" = "failure" ]; then
            echo "Live E2E tests failed"
            exit 1
          fi
          
          echo "Live E2E tests passed"

