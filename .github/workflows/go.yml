# Go CI workflow for build, test, and lint.
#
# Do not use workflow-level paths-ignore for required checks.
# GitHub leaves skipped required workflows Pending forever.
# Instead, we always run the workflow and skip individual jobs conditionally.
# See: https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#onpull_requestpull_request_targetpathspaths-ignore

name: Go
on:
  pull_request:
  push:
    branches:
    - '!dependabot/*'

env:
  GOPATH: ${{ github.workspace }}/go

jobs:
  # Detect which path groups changed to conditionally skip expensive jobs.
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - 'api/**'
              - 'commands/**'
              - 'e2e/**'
              - 'internal/**'
              - 'pkg/**'
              - 'healthcheck/**'
              - 'mdtogo/**'
              - 'Makefile'
              - 'go.mod'
              - 'go.sum'
              - 'main.go'

  build-test:
    name: build-test-${{ matrix.runtime }}
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        runtime: [docker, podman]
    steps:
      - name: Check runtime
        if: ${{ matrix.runtime == 'podman' }}
        run: |
          which podman
          podman version
      - name: Check out code
        uses: actions/checkout@v6
        with:
          path: ${{ env.GOPATH }}/src/github.com/kptdev/kpt
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go/src/github.com/kptdev/kpt/go.mod
          cache: true
          cache-dependency-path: go/src/github.com/kptdev/kpt/go.sum
      - name: Build, Test, Lint
        working-directory: ${{ env.GOPATH }}/src/github.com/kptdev/kpt
        run: |
          git config --global user.email you@example.com
          git config --global user.name Your Name
          make all
          make test-docker
        env:
          KRM_FN_RUNTIME: ${{ matrix.runtime }}

  build-macos:
    name: build-macos
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: macos-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          path: ${{ env.GOPATH }}/src/github.com/kptdev/kpt
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go/src/github.com/kptdev/kpt/go.mod
          cache: true
          cache-dependency-path: go/src/github.com/kptdev/kpt/go.sum
      - name: Build
        working-directory: ${{ env.GOPATH }}/src/github.com/kptdev/kpt
        run: |
          make build

  go-gate:
    name: go
    needs: [changes, build-test, build-macos]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          # If no code changes, this check is not applicable, pass.
          if [ "${{ needs.changes.outputs.code }}" = "false" ]; then
            echo "No code changes, skipping Go tests"
            exit 0
          fi
          
          # If any required job failed, fail this check.
          if [ "${{ needs.build-test.result }}" = "failure" ] || \
             [ "${{ needs.build-macos.result }}" = "failure" ]; then
            echo "Go tests failed"
            exit 1
          fi
          
          echo "Go tests passed"

