name: "Kpt Live - Apply Tests"
on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "documentation/**"
      - "site/**"
  push:
    branches:
    - '!dependabot/*'
    paths-ignore:
      - "docs/**"
      - "documentation/**"
      - "site/**"

jobs:
  kind:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: ["1.35.5@sha256:ce977ae6d65918d0b58a5f8b5e940429c2ce42fa3a5619ec2bbc60b949c0ac95", "1.36.1@sha256:3489c7674813ba5d8b1a9977baea8a6e553784dab7b84759d1014dbd78f7ebd5"]
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          path: go/src/github.com/kptdev/kpt
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go/src/github.com/kptdev/kpt/go.mod
          cache: true
          cache-dependency-path: go/src/github.com/kptdev/kpt/go.sum
      # Pinned to Commit to ensure action is consistent: https://docs.github.com/en/actions/learn-github-actions/security-hardening-for-github-actions#using-third-party-actions
      # If you upgrade this version confirm the changes match your expectations
      - name: Install KinD
        uses: engineerd/setup-kind@v0.6.2
        with:
          version: "v0.32.0"
          skipClusterCreation: true
          skipClusterLogsExport: true

      - name: Run Tests
        working-directory: go/src/github.com/kptdev/kpt
        env:
          K8S_VERSION: ${{ matrix.version }}
        run: |
          K8S_VERSION=$K8S_VERSION make test-live-apply
